<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funkworks Banner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    display: flex;
    justify-content: center;
    padding: 0;
  }

  .banner {
    display: flex;
    align-items: center;
    gap: 32px;
    width: 900px;
    height: 260px;
    padding: 20px 40px 20px 20px;
    background: #ffffff;
    border: 1px solid #e0e0e0;
    border-radius: 12px;
    font-family: 'Inter', Helvetica, Arial, sans-serif;
  }

  .mascot {
    height: 220px;
    width: auto;
    flex-shrink: 0;
  }

  .text {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .name {
    font-size: 40px;
    font-weight: 600;
    color: #1a1a1a;
    letter-spacing: 1px;
  }

  .tagline {
    font-size: 28px;
    font-weight: 600;
    color: #CC2200;
  }

  .slogan {
    font-size: 20px;
    font-weight: 300;
    color: #555555;
  }

  .accent {
    width: 120px;
    height: 2px;
    background: #CC2200;
    opacity: 0.6;
    border-radius: 1px;
  }
</style>
</head>
<body>
  <div class="banner">
    <img class="mascot" src="mascot.png" alt="Funkworks mascot">
    <div class="text">
      <div class="name">Funkworks</div>
      <div class="tagline">Addons built from real problems.</div>
      <div class="slogan">Small tools. Big difference.</div>
      <div class="accent"></div>
    </div>
  </div>
</body>
</html>
