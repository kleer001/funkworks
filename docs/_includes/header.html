<style>

.site-nav .nav-trigger, .site-nav label[for="nav-trigger"], .site-nav .menu-icon { display: none; }
.site-nav .trigger { display: flex !important; align-items: center; gap: 0.5rem; }
.dcc-filter {

  padding: 0.45rem 1.1rem;

  font-size: 0.95rem;

.site-nav .latest-link .latest-label { color: #888; font-size: 0.85rem; margin-right: 0.25rem; }

<header class="site-header" role="banner">
  <div class="wrapper">
    <nav class="site-nav">
      <div class="trigger">
        <a class="dcc-filter dcc-blender" href="{{ '/#blender' | relative_url }}">Blender</a>
        <a class="dcc-filter dcc-houdini" href="{{ '/#houdini' | relative_url }}">Houdini</a>
